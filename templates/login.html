<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Login – SkillBridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 100%; max-width: 420px; }
    h2 { color: #1a1a6e; margin-bottom: 0.3rem; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1.8rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #444; margin-bottom: 0.3rem; }
    input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid #dde3f0; border-radius: 8px; font-size: 0.95rem; margin-bottom: 1.2rem; transition: border 0.2s; }
    input:focus { outline: none; border-color: #0077b6; }
    .btn { width: 100%; padding: 0.9rem; background: #1a1a6e; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #0077b6; }
    .link { text-align: center; margin-top: 1.2rem; font-size: 0.88rem; color: #555; }
    .link a { color: #0077b6; text-decoration: none; font-weight: 600; }
    .error { color: #d62828; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🌉 Welcome Back</h2>
    <p class="subtitle">Login to access your career recommendations</p>
    <div class="error" id="errorMsg"></div>
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com"/>
    <label>Password</label>
    <input type="password" id="password" placeholder="Your password"/>
    <button class="btn" onclick="login()">Login</button>
    <div class="link">Don't have an account? <a href="/signup">Sign Up</a></div>
  </div>
  <script>
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      const res = await fetch('/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
      const data = await res.json();
      if (res.ok) { window.location.href = data.redirect; }
      else { errEl.textContent = data.error; errEl.style.display = 'block'; }
    }
  </script>
</body>
</html>
